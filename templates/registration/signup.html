{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Sign Up - EduPredict AI{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card p-4">
            <div class="text-center mb-4">
                <h3 class="fw-bold">Create Account</h3>
                <p class="text-muted">Join the academic intervention system</p>
            </div>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 py-2 mt-3">Sign Up</button>
            </form>
            <div class="text-center mt-3">
                <p class="small">Already have an account? <a href="{% url 'login' %}" class="text-decoration-none">Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
