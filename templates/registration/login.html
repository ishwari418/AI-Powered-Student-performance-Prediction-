{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - EduPredict AI{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-4">
        <div class="card p-4">
            <div class="text-center mb-4">
                <h3 class="fw-bold">Login</h3>
                <p class="text-muted">Sign in to your account</p>
            </div>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 py-2 mt-3">Login</button>
            </form>
            <div class="text-center mt-3">
                <p class="small">Don't have an account? <a href="{% url 'signup' %}" class="text-decoration-none">Sign Up</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
