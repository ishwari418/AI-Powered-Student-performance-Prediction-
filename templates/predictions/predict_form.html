{% extends 'base.html' %}

{% block title %}New Prediction - EduPredict AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Predict Student Performance</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Select Student</label>
                            <select name="student_id" class="form-select" required>
                                <option value="">Choose student...</option>
                                {% for s in students %}
                                <option value="{{ s.student_id }}">{{ s.first_name }} {{ s.last_name }} ({{ s.student_id }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Attendance (%)</label>
                            <input type="number" name="attendance" class="form-control" min="0" max="100" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Study Hours (Daily)</label>
                            <input type="number" step="0.1" name="study_hours" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Previous Exam Grade (0-100)</label>
                            <input type="number" name="previous_grades" class="form-control" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Parental Education Level</label>
                            <select name="parental_education" class="form-select">
                                <option value="0">None</option>
                                <option value="1">High School</option>
                                <option value="2">Bachelor</option>
                                <option value="3">Master+</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Sleep Hours</label>
                            <input type="number" name="sleep_hours" class="form-control" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label class="form-label">Assignment Completion (%)</label>
                            <input type="number" name="assignment_completion" class="form-control" required>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="internet_access" id="internet" checked>
                                <label class="form-check-label" for="internet">Internet Access</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="extracurricular_activities" id="extra">
                                <label class="form-check-label" for="extra">Extracurricular Activities</label>
                            </div>
                        </div>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-primary px-5 py-2">
                            <i class="fas fa-magic me-2"></i> Run AI Prediction
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
